# APPLICATION
spring.application.name=patient-service
server.port=8081

# DATABASE (Added the 'createDatabaseIfNotExist' fix we used for Auth/Doctor)
spring.datasource.url=jdbc:mysql://localhost:3306/patient_profile_management_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.password=root
spring.datasource.username=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# SPRING DATA JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.type=trace

# EUREKA (FIXED: Set to true and added identification)
eureka.client.enabled=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}:${random.value}