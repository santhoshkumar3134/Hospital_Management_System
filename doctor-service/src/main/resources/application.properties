# 1. Service Identification
spring.application.name=doctor-schedule-service
server.port=8084

# 2. Database Connection URL (Added SSL & Public Key Retrieval fixes)
spring.datasource.url=jdbc:mysql://localhost:3306/doctor_service_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# 4. MySQL Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 5. JPA/Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 6. Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
# Using random value for more reliable unique identification
eureka.instance.instance-id=${spring.application.name}:${server.port}:${random.value}

# 7. Feign Client Logging
logging.level.com.hospital.management.doctorservice.client=DEBUG

# 8. Suppress Spring Cloud version mismatch warnings
spring.cloud.compatibility-verifier.enabled=false

# 9. Swagger / OpenAPI Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true