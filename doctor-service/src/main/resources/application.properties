# ?? 1. Service Identification
spring.application.name=doctor-service
server.port=8083

# 2. Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/doctor_service_db?createDatabaseIfNotExist=true

# Credentials read from environment variables ? never hardcode in source code.
# Set DB_USERNAME and DB_PASSWORD in your OS environment, Docker env, or CI/CD secrets.
# The value after the colon (:) is the local dev fallback only.
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. JPA / Hibernate Settings
# Use 'update' for development only.
# Switch to 'validate' in staging/production and manage schema changes
# with Flyway or Liquibase migrations to avoid accidental data loss.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#  4. Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
# prefer-ip-address=true is important in containerized/local environments
# so Eureka registers the IP rather than the hostname (which may not resolve)
eureka.instance.prefer-ip-address=true

#  5. Feign & Logging
# Shows the actual HTTP calls made to medical-history-service for debugging
logging.level.com.hospital.management.doctorservice.client=DEBUG

# Suppress Spring Cloud version mismatch warnings.
# Spring Boot 3.4.3 + Spring Cloud 2024.0.0 are compatible.
# Investigate and remove this if possible after confirming no real mismatch.
spring.cloud.compatibility-verifier.enabled=false