# 1. Service Identification
spring.application.name=doctor-schedule-service
server.port=8083

# 2. Database Connection URL
spring.datasource.url=jdbc:mysql://localhost:3306/doctor_service_db?createDatabaseIfNotExist=true

# 3. Database Username and Password
spring.datasource.username=root
spring.datasource.password=root

# 4. MySQL Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 5. JPA/Hibernate Properties
# Automatically create/update database tables based on your JPA entities
spring.jpa.hibernate.ddl-auto=update

# Suppresses the open-in-view warning ? disabled for better performance
spring.jpa.open-in-view=false

# Show the SQL queries generated by Hibernate
spring.jpa.show-sql=true

# Format the SQL queries for better readability
spring.jpa.properties.hibernate.format_sql=true

# 6. Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
# prefer-ip-address=true ensures Eureka registers the service IP rather than
# hostname ? important in local and containerized environments where
# hostnames may not resolve correctly
eureka.instance.prefer-ip-address=true

# 7. Feign Client Logging
# Shows actual HTTP requests and responses made by all Feign clients
# (DoctorClient and MedicalHistoryClient) ? useful for debugging integration issues
logging.level.com.hospital.management.doctorservice.client=DEBUG

# 8. Suppress Spring Cloud version mismatch warnings
spring.cloud.compatibility-verifier.enabled=false

# 9. Swagger / OpenAPI Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# 10. Spring Security (disabled for now ? enable after full service integration)
#spring.security.user.name=kiran
#spring.security.user.password=Kiran@123
#spring.security.user.roles=ADMIN

# eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
eureka.instance.instance-id=${spring.cloud.client.ip-address}:${spring.application.name}:${server.port}
