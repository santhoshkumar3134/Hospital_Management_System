# APPLICATION
spring.application.name=patient-service
server.port=8081
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:dev-data.sql
spring.sql.init.continue-on-error=true

# DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/patient_profile_management_database_hams?createDatabaseIfNotExist=true
spring.datasource.password=root
spring.datasource.username=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# SPRING DATA JPA
spring.jpa.hibernate.ddl-auto=create
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# EUREKA
eureka.client.enabled=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}:${random.value}

spring.cloud.openfeign.client.config.default.connect-timeout=5000
spring.cloud.openfeign.client.config.default.read-timeout=10000

# SWAGGER
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=false


