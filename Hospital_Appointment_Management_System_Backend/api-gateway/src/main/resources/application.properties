spring.application.name=api-gateway
server.port=8090

# Gateway Discovery Config
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Eureka Client Config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
eureka.instance.instance-id=${spring.application.name}:${server.port}:${random.value}

# Timeout config
spring.cloud.gateway.httpclient.connect-timeout=10000
spring.cloud.gateway.httpclient.response-timeout=60s


# IMPORTANT: Set JWT_SECRET environment variable in production. Never commit the real secret.
# The fallback below is for local development only.
jwt.secret=${JWT_SECRET:H@ms-D3v-S3cr3t!K3y#2024$Local$Only%Do-Not-Use-In-Prod-XyZ9}

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG