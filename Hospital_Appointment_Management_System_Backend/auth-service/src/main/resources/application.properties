spring.application.name=auth-service
server.port=8091
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:dev-data.sql
spring.sql.init.continue-on-error=true

# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
eureka.instance.instance-id=${spring.application.name}:${server.port}:${random.value}

# Database Configuration with Auto-Create
spring.datasource.url=jdbc:mysql://localhost:3306/authDB_database_hams?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# Driver and Hibernate settings
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=create
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Ensure the database platform is recognized correctly
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Swagger
# Set to true locally for API exploration. Must be false in production.
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=false

# IMPORTANT: Set JWT_SECRET environment variable in production. Never commit the real secret.
# The fallback below is for local development only.
jwt.secret=${JWT_SECRET:H@ms-D3v-S3cr3t!K3y#2024$Local$Only%Do-Not-Use-In-Prod-XyZ9}

spring.cloud.openfeign.client.config.default.connect-timeout=5000
spring.cloud.openfeign.client.config.default.read-timeout=10000




