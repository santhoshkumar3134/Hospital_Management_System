spring.application.name=medical-history-service
server.port=8085
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:dev-data.sql
spring.sql.init.continue-on-error=true

spring.datasource.url=jdbc:mysql://localhost:3306/medicalHistory_database_hams?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

# Driver and Hibernate settings
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=create
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.cloud.openfeign.client.config.default.connect-timeout=5000
spring.cloud.openfeign.client.config.default.read-timeout=10000

# SWAGGER
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=false

eureka.client.enabled=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}:${random.value}

logging.level.com.hospital.management.medicalhistoryservice=DEBUG


