# ==================== APPLICATION ====================
spring.application.name=appointment-service
server.port=8083
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:dev-data.sql
spring.sql.init.continue-on-error=true

# ==================== DATABASE ====================
spring.datasource.url=jdbc:mysql://localhost:3306/appointment_service_database_hams?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==================== JPA ====================
spring.jpa.hibernate.ddl-auto=create
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# ==================== EUREKA ====================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
eureka.instance.instance-id=${spring.application.name}:${server.port}:${random.value}

# ==================== FEIGN ====================
spring.cloud.openfeign.circuitbreaker.enabled=true
spring.cloud.openfeign.client.config.default.connect-timeout=5000
spring.cloud.openfeign.client.config.default.read-timeout=15000
spring.cloud.openfeign.client.config.default.logger-level=BASIC

# ==================== CIRCUIT BREAKER ====================
spring.cloud.circuitbreaker.resilience4j.disable-time-limiter=true

# ==================== LOGGING ====================
logging.file.path=./logs
logging.level.com.hospital.appointmentservice.client.DoctorServiceClient=DEBUG
logging.level.com.hospital.appointmentservice.client.DoctorSheduleClient=DEBUG
logging.level.com.hospital.appointmentservice.client.NotificationServiceClient=DEBUG
logging.level.com.hospital.appointmentservice.client.MedicalHistoryClient=DEBUG
logging.level.feign.Logger=DEBUG

# ==================== ACTUATOR ====================
management.endpoints.web.exposure.include=health,info,circuitbreakers,circuitbreakerevents,metrics
management.endpoint.health.show-details=always

# ==================== SUPPRESS WARNINGS ====================
spring.cloud.compatibility-verifier.enabled=false
spring.jackson.deserialization.fail-on-null-for-primitives=false