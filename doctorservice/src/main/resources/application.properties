# 1. Service Identification
spring.application.name=doctor-service
server.port=8081

# 2. Database Configuration (MySQL)
# Replace 'hospital_db' with your actual database name
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 4. Eureka Client Configuration
# This allows your service to register itself and find 'medical-history-service'
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# 5. OpenFeign & Logging (Optional but helpful for debugging)
# This helps you see the actual HTTP calls to the Medical History service
logging.level.com.hospital.management.doctorservice.client=DEBUG

spring.cloud.compatibility-verifier.enabled=false