#APPLICATION
spring.application.name=appointmentservice
server.port=8082

#DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/appointment_service_db
spring.datasource.password=root
spring.datasource.username=root
spring.datasource.classDriverName=com.jdbc.cj.mysql.Driver

#SPRING DATA JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.type=trace

# Dummy URL just to let the application start up
doctor.service.url=http://localhost:8083
patient.service.url=http://localhost:8081
medicalhistory.service.url=http://localhost:8084
notification.service.url=http://localhost:8085

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/