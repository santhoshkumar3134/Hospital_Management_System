# Test-specific configuration to override production values

# Database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Eureka - Disable for tests
eureka.client.enabled=false

# Feign Client URLs - Set to dummy values for test context loading
doctor.service.url=http://localhost:8091
doctor-schedule.service.url=http://localhost:8091
notification.service.url=http://localhost:8093
