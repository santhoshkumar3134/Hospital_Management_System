spring.application.name=doctor-profile-service
server.port=8082

# DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/doctor_profile_management_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.password=root
spring.datasource.username=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# SPRING DATA JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.type=trace

# EUREKA (Fixed enabled status)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.enabled=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}:${random.value}

# Keep this disabled if you aren't using a Config Server
spring.cloud.config.enabled=false