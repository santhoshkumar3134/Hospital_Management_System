spring.application.name=auth-service
server.port=8091

# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
eureka.instance.instance-id=${spring.application.name}:${server.port}:${random.value}

# Database Configuration with Auto-Create
spring.datasource.url=jdbc:mysql://localhost:3306/authDB?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# Driver and Hibernate settings
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Optional: Ensure the database platform is recognized correctly
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect