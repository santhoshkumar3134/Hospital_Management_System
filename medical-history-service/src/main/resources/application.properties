spring.application.name=medical-history-service
# Port moved to 8085 to avoid conflict with Schedule Service (8084)
server.port=8085

# Eureka Registration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
eureka.instance.instance-id=${spring.application.name}:${server.port}:${random.value}

# Database Configuration with Auto-Create
spring.datasource.url=jdbc:mysql://localhost:3306/medicalHistoryDB?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# Driver and Hibernate settings
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true